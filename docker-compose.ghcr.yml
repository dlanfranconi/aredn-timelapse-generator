services:
  aredn-timelapse-generator:
    image: ghcr.io/dlanfranconi/aredn-timelapse-generator:latest-wip
    container_name: aredn-timelapse-generator
    restart: unless-stopped

    ports:
      - "8888:8888"
      - "8889:8889"

    environment:
      TZ: America/Los_Angeles
      FENETRE_PID_FILE: /tmp/fenetre.pid

    volumes:
      # Persistent runtime config on the host. The admin UI writes changes here.
      - /srv/fenetre/config.yaml:/srv/fenetre/config.yaml
      # Persistent generated public UI, photos, videos, metadata, and logs.
      - /srv/fenetre/data:/srv/fenetre/data
      - /srv/fenetre/logs:/srv/fenetre/logs

    # Uncomment for Intel QuickSync / VAAPI hardware encoding.
    # devices:
    #   - /dev/dri:/dev/dri
