services:
  aredn-timelapse-generator:
    build: .
    container_name: aredn-timelapse-generator
    restart: unless-stopped

    ports:
      # Public/static camera website
      - "8888:8888"
      # Admin/configuration GUI
      - "8889:8889"

    environment:
      TZ: America/Los_Angeles
      FENETRE_PID_FILE: /tmp/fenetre.pid

    volumes:
      # Persistent runtime config on the host. The admin UI writes changes here.
      - /srv/fenetre/config.yaml:/srv/fenetre/config.yaml

      # Persistent generated public UI, photos, videos, and metadata.
      - /srv/fenetre/data:/srv/fenetre/data

      # Persistent logs.
      - /srv/fenetre/logs:/srv/fenetre/logs

    # Optional: enable this only if you want Intel VAAPI/QSV hardware encoding
    # and the host has /dev/dri available.
    # devices:
    #   - /dev/dri:/dev/dri
